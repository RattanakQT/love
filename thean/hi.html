<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Someone Special</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(142, 197, 252, 0.45), transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(161, 140, 209, 0.32), transparent 42%),
        linear-gradient(135deg, #2f3f70, #3d5b95, #7d8fd8, #f7c5d9);
      position: relative;
    }

    .glow {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(184, 222, 255, 0.28);
      filter: blur(50px);
      animation: floatGlow 8s ease-in-out infinite;
    }

    .glow.one { top: 10%; left: 8%; }
    .glow.two { bottom: 8%; right: 10%; animation-delay: 2s; }

    @keyframes floatGlow {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.08); }
    }

    .container {
      width: min(92%, 760px);
      padding: 50px 32px;
      border-radius: 28px;
      text-align: center;
      background: linear-gradient(
        155deg,
        rgba(255, 255, 255, 0.2),
        rgba(182, 216, 255, 0.14),
        rgba(255, 255, 255, 0.08)
      );
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(226, 241, 255, 0.45);
      box-shadow: 0 24px 70px rgba(20, 28, 67, 0.35);
      color: white;
      position: relative;
      z-index: 2;
    }

    .heart {
      font-size: 64px;
      color: #ff4d6d;
      display: inline-block;
      animation: heartbeat 1.2s infinite;
      margin-bottom: 18px;
      text-shadow: 0 0 22px rgba(255, 123, 147, 0.75);
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.15); }
      40% { transform: scale(1); }
      60% { transform: scale(1.2); }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
      margin-bottom: 16px;
      letter-spacing: 1px;
      text-shadow: 0 4px 22px rgba(27, 43, 103, 0.35);
    }

    .subtitle {
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      line-height: 1.8;
      max-width: 620px;
      margin: 0 auto 28px;
      color: rgba(242, 248, 255, 0.95);
    }

    .message-box {
      margin: 28px auto 22px;
      padding: 24px;
      border-radius: 20px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.16),
        rgba(182, 218, 255, 0.15)
      );
      border: 1px solid rgba(215, 235, 255, 0.38);
      max-width: 640px;
      min-height: 105px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      line-height: 1.8;
      box-shadow:
        inset 0 0 24px rgba(255, 255, 255, 0.08),
        0 10px 30px rgba(28, 46, 108, 0.16);
      transition: transform 0.35s ease, background 0.35s ease;
    }

    .message-box.show {
      transform: scale(1.02);
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.2),
        rgba(170, 210, 255, 0.22)
      );
    }

    button {
      margin-top: 8px;
      padding: 14px 30px;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(135deg, #ff5f7f, #e53058);
      box-shadow: 0 12px 28px rgba(155, 24, 54, 0.34);
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 16px 34px rgba(155, 24, 54, 0.42);
    }

    .footer {
      margin-top: 22px;
      font-size: 0.95rem;
      opacity: 0.9;
      letter-spacing: 0.4px;
    }

    .floating-heart {
      position: absolute;
      bottom: -20px;
      font-size: 22px;
      color: rgba(224, 241, 255, 0.9);
      animation: rise linear forwards;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.4) rotate(12deg);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 38px 20px;
      }

      .message-box {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <div class="container">
    <div class="heart">❤</div>
    <h1>Someone Needs To Know This...</h1>
    <p class="subtitle">
      Some feelings are too beautiful to stay hidden. This little page exists for one reason only —
      to remind someone special how deeply they are loved.
    </p>

    <div class="message-box" id="messageBox">
      Click the button and let the heart speak.
    </div>

    <button id="loveBtn">Open My Heart</button>

    <p class="footer">Made with love, sincerity, and a little courage.</p>
  </div>

  <script>
    const messages = [
      { text: "I love you more than words can ever fully explain.", emoji: "💖" },
      { text: "You make ordinary days feel beautiful just by being in them.", emoji: "🌷" },
      { text: "Every time I think of you, my heart feels a little warmer.", emoji: "🥰" },
      { text: "If I had one wish, it would be to keep making you smile.", emoji: "😊" },
      { text: "No matter how busy life gets, my heart always finds its way back to you.", emoji: "🧭" },
      { text: "You are not just special — you are unforgettable.", emoji: "✨" },
      { text: "Loving you feels like the most natural and beautiful thing in the world.", emoji: "💞" }
    ];

    const btn = document.getElementById('loveBtn');
    const box = document.getElementById('messageBox');
    let index = 0;

    btn.addEventListener('click', () => {
      const current = messages[index];
      box.textContent = `${current.text} ${current.emoji}`;
      box.classList.remove('show');
      void box.offsetWidth;
      box.classList.add('show');
      createHearts(14, ['❤', '💕', current.emoji]);
      index = (index + 1) % messages.length;
    });

    function createHearts(count, icons = ['❤', '💕']) {
      for (let i = 0; i < count; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.textContent = icons[Math.floor(Math.random() * icons.length)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = 4 + Math.random() * 3 + 's';
        heart.style.fontSize = 18 + Math.random() * 24 + 'px';
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 7000);
      }
    }

    setInterval(() => {
      createHearts(2);
    }, 1200);
  </script>
</body>
</html>
